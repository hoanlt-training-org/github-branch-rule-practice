name: Salesforce Validate Deploy

on:
  pull_request:
    branches:
      - main

jobs:
  salesforce-validate-deploy:
    name: salesforce-validate-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Write JWT key to file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Login to Salesforce with JWT
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_LOGIN_URL }}" \
            --alias ci-org

      - name: Validate Salesforce metadata deploy
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org ci-org \
            --test-level RunSpecifiedTests \
            --tests HelloWorldTest \
            --wait 30