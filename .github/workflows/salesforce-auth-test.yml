name: Salesforce Auth Test

on:
  workflow_dispatch:

jobs:
  salesforce-auth-test:
    name: salesforce-auth-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Write JWT key to file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Login to Salesforce with JWT
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_LOGIN_URL }}" \
            --alias ci-org

      - name: Verify Salesforce org connection
        run: |
          sf org display --target-org ci-org